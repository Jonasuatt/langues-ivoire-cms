<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3E2723"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5A3720"/><stop offset="100%" stop-color="#4A2D18"/></linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Hunter attire with animal skin -->
  <path d="M50 148 Q70 130 100 134 Q130 130 150 148 L160 200 H40 Z" fill="#6D4C41"/>
  <circle cx="70" cy="165" r="3" fill="#5D4037" opacity="0.5"/>
  <circle cx="90" cy="158" r="2.5" fill="#5D4037" opacity="0.5"/>
  <circle cx="110" cy="155" r="3" fill="#5D4037" opacity="0.5"/>
  <circle cx="130" cy="160" r="2.5" fill="#5D4037" opacity="0.5"/>
  <!-- Leather strap across chest -->
  <path d="M65 148 L135 200" stroke="#4E342E" stroke-width="4"/>
  <!-- Neck -->
  <rect x="85" y="124" width="30" height="18" rx="5" fill="url(#skin)"/>
  <!-- Tooth/bone necklace -->
  <path d="M82 140 L80 148 L84 148 Z" fill="#FFF8E1"/>
  <path d="M92 138 L90 146 L94 146 Z" fill="#FFF8E1"/>
  <path d="M102 137 L100 145 L104 145 Z" fill="#FFF8E1"/>
  <path d="M112 138 L110 146 L114 146 Z" fill="#FFF8E1"/>
  <path d="M122 140 L120 148 L124 148 Z" fill="#FFF8E1"/>
  <!-- Face - strong -->
  <path d="M63 95 Q63 65 100 62 Q137 65 137 95 L134 118 Q130 138 100 140 Q70 138 66 118 Z" fill="url(#skin)"/>
  <!-- Short hair -->
  <ellipse cx="100" cy="74" rx="39" ry="24" fill="#1A1A1A"/>
  <!-- Face markings -->
  <line x1="68" y1="100" x2="74" y2="100" stroke="#8D6E63" stroke-width="2"/>
  <line x1="68" y1="106" x2="74" y2="106" stroke="#8D6E63" stroke-width="2"/>
  <line x1="126" y1="100" x2="132" y2="100" stroke="#8D6E63" stroke-width="2"/>
  <line x1="126" y1="106" x2="132" y2="106" stroke="#8D6E63" stroke-width="2"/>
  <!-- Determined eyebrows -->
  <path d="M76 90 Q84 85 94 89" stroke="#2C1810" stroke-width="2.5" fill="none"/>
  <path d="M106 89 Q116 85 124 90" stroke="#2C1810" stroke-width="2.5" fill="none"/>
  <!-- Intense eyes -->
  <ellipse cx="86" cy="97" rx="7" ry="5" fill="white"/>
  <circle cx="87" cy="97" r="3.5" fill="#2C1810"/>
  <circle cx="88" cy="96" r="1.2" fill="white"/>
  <ellipse cx="114" cy="97" rx="7" ry="5" fill="white"/>
  <circle cx="115" cy="97" r="3.5" fill="#2C1810"/>
  <circle cx="116" cy="96" r="1.2" fill="white"/>
  <!-- Nose -->
  <path d="M95 103 Q100 112 105 103" stroke="#3E2515" stroke-width="1.5" fill="none"/>
  <!-- Courageous expression -->
  <path d="M90 118 Q100 124 110 118" stroke="#3E2515" stroke-width="2" fill="none"/>
</svg>
