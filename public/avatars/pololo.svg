  <ellipse cx="86" cy="98" rx="6" ry="5" fill="white"/>
  <circle cx="87" cy="98" r="3" fill="#2C1810"/>
  <circle cx="88" cy="97" r="1" fill="white"/>
  <ellipse cx="114" cy="98" rx="6" ry="5" fill="white"/>
