    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B6914"/><stop offset="100%" stop-color="#7A5C10"/></linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
