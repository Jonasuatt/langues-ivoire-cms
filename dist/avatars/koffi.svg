<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0B3D2E"/><stop offset="100%" stop-color="#145A3E"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8B6914"/><stop offset="100%" stop-color="#7A5C10"/></linearGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <!-- Kente cloth -->
  <path d="M55 150 Q70 135 100 140 Q130 135 145 150 L155 200 H45 Z" fill="#C8960C" stroke="#A67B00" stroke-width="1"/>
  <rect x="60" y="148" width="8" height="52" fill="#2E7D32" opacity="0.6"/>
  <rect x="80" y="143" width="8" height="57" fill="#D32F2F" opacity="0.5"/>
  <rect x="110" y="143" width="8" height="57" fill="#2E7D32" opacity="0.6"/>
  <rect x="130" y="148" width="8" height="52" fill="#D32F2F" opacity="0.5"/>
  <!-- Neck -->
  <rect x="85" y="128" width="30" height="20" rx="5" fill="url(#skin)"/>
  <!-- Face -->
  <ellipse cx="100" cy="105" rx="38" ry="42" fill="url(#skin)"/>
  <!-- Gray hair -->
  <ellipse cx="100" cy="78" rx="40" ry="28" fill="#9E9E9E"/>
  <ellipse cx="100" cy="72" rx="36" ry="22" fill="#BDBDBD"/>
  <!-- Eyebrows -->
  <path d="M78 94 Q84 90 92 93" stroke="#4E3B0A" stroke-width="2" fill="none"/>
  <path d="M108 93 Q116 90 122 94" stroke="#4E3B0A" stroke-width="2" fill="none"/>
  <!-- Eyes -->
  <ellipse cx="86" cy="100" rx="6" ry="5" fill="white"/>
  <circle cx="87" cy="100" r="3" fill="#2C1810"/>
  <circle cx="88" cy="99" r="1" fill="white"/>
  <ellipse cx="114" cy="100" rx="6" ry="5" fill="white"/>
  <circle cx="115" cy="100" r="3" fill="#2C1810"/>
  <circle cx="116" cy="99" r="1" fill="white"/>
  <!-- Nose -->
  <path d="M96 105 Q100 112 104 105" stroke="#6B4D10" stroke-width="1.5" fill="none"/>
  <!-- Warm smile -->
  <path d="M88 116 Q100 126 112 116" stroke="#5C3D0A" stroke-width="2" fill="none"/>
  <!-- Wrinkle lines (wise elder) -->
  <path d="M74 108 Q76 110 78 108" stroke="#6B4D10" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M122 108 Q124 110 126 108" stroke="#6B4D10" stroke-width="0.8" fill="none" opacity="0.5"/>
</svg>
