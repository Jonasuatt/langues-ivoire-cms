  <path d="M68 62 Q100 54 132 62" fill="none" stroke="#A67B00" stroke-width="1" opacity="0.5"/>
  <path d="M66 69 Q100 60 134 69" fill="none" stroke="#A67B00" stroke-width="1" opacity="0.5"/>
